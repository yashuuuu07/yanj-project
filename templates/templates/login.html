{% extends "base.html" %}

{% block title %}Login - EmotionTrack AI{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-20">
    <div class="glass p-8 rounded-2xl shadow-2xl">
        <h2 class="text-3xl font-bold mb-6 text-center">Welcome Back</h2>
        <form action="{{ url_for('login') }}" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
                <input type="email" name="email" required
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition text-white outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition text-white outline-none">
            </div>
            <button type="submit"
                class="w-full py-4 bg-gradient-to-r from-blue-600 to-purple-600 rounded-xl font-bold hover:scale-[1.02] transition-transform active:scale-95 shadow-lg shadow-blue-500/20">
                Log In
            </button>
        </form>
        <p class="mt-6 text-center text-gray-400">
            Don't have an account? <a href="{{ url_for('register') }}" class="text-blue-400 hover:underline">Register
                here</a>
        </p>
    </div>
</div>
{% endblock %}
