{% extends "base.html" %}

{% block title %}Register - EmotionTrack AI{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-20">
    <div class="glass p-8 rounded-2xl shadow-2xl">
        <h2 class="text-3xl font-bold mb-6 text-center">Create Account</h2>
        <form action="{{ url_for('register') }}" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Full Name</label>
                <input type="text" name="name" required
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition text-white outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
                <input type="email" name="email" required
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition text-white outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition text-white outline-none">
            </div>
            <button type="submit"
                class="w-full py-4 bg-gradient-to-r from-purple-600 to-blue-600 rounded-xl font-bold hover:scale-[1.02] transition-transform active:scale-95 shadow-lg shadow-purple-500/20">
                Sign Up
            </button>
        </form>
        <p class="mt-6 text-center text-gray-400">
            Already have an account? <a href="{{ url_for('login') }}" class="text-purple-400 hover:underline">Login
                here</a>
        </p>
    </div>
</div>
{% endblock %}
